name: Rebuild Graphify Graph

# Este workflow se ejecuta automáticamente cuando:
on:
  push:
    paths:
      - '**.md'              # Cualquier archivo markdown cambie
      - '.github/workflows/graphify.yml'  # Este archivo cambie
    branches:
      - main
  workflow_dispatch:  # También puedes ejecutarlo manualmente desde GitHub

# El "robot" que hace el trabajo
permissions:
  contents: write  # Necesita permiso para escribir los archivos generados

jobs:
  rebuild:
    runs-on: ubuntu-latest  # Usa un servidor Linux de GitHub

    steps:
      # Paso 1: Descargar tu código
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Instalar Python y graphify
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graphify
        run: pip install graphifyy

      # Paso 3: Detectar archivos (ver qué hay en la carpeta)
      - name: Detect files
        run: |
          mkdir -p graphify-out
          python -c "
          import json
          from graphify.detect import detect
          from pathlib import Path
          result = detect(Path('.'))
          print(json.dumps(result, ensure_ascii=False))
          " > graphify-out/.graphify_detect.json
          python -c "import sys; print(sys.executable)" > graphify-out/.graphify_python

      # Paso 4: Extraer entidades y relaciones
      - name: Extract entities
        run: |
          python -c "
          import json
          from graphify.extract import collect_files, extract
          from pathlib import Path

          detect = json.loads(Path('graphify-out/.graphify_detect.json').read_text())
          code_files = []
          for f in detect.get('files', {}).get('code', []):
              code_files.extend(collect_files(Path(f)) if Path(f).is_dir() else [Path(f)])

          if code_files:
              result = extract(code_files, cache_root=Path('.'))
              Path('graphify-out/.graphify_ast.json').write_text(json.dumps(result, indent=2, ensure_ascii=False))
          else:
              Path('graphify-out/.graphify_ast.json').write_text(json.dumps({'nodes':[],'edges':[],'input_tokens':0,'output_tokens':0}))

          # For docs, use graphify's built-in extraction with Claude
          doc_files = detect.get('files', {}).get('document', []) + detect.get('files', {}).get('paper', [])
          if doc_files:
              from graphify.llm import extract_corpus_parallel
              sem = extract_corpus_parallel(doc_files, backend='gemini')
              Path('graphify-out/.graphify_semantic.json').write_text(json.dumps(sem, indent=2, ensure_ascii=False))
          else:
              Path('graphify-out/.graphify_semantic.json').write_text(json.dumps({'nodes':[],'edges':[],'hyperedges':[],'input_tokens':0,'output_tokens':0}))
          "

      # Paso 5: Construir el grafo
      - name: Build graph
        run: |
          python -c "
          import json
          from graphify.build import build_from_json
          from graphify.cluster import cluster, score_all
          from graphify.analyze import god_nodes, surprising_connections, suggest_questions
          from graphify.report import generate
          from graphify.export import to_json
          from pathlib import Path

          ast = json.loads(Path('graphify-out/.graphify_ast.json').read_text())
          sem = json.loads(Path('graphify-out/.graphify_semantic.json').read_text())

          seen = {n['id'] for n in ast['nodes']}
          merged_nodes = list(ast['nodes'])
          for n in sem['nodes']:
              if n['id'] not in seen:
                  merged_nodes.append(n)
                  seen.add(n['id'])

          extraction = {
              'nodes': merged_nodes,
              'edges': ast['edges'] + sem['edges'],
              'hyperedges': sem.get('hyperedges', []),
              'input_tokens': sem.get('input_tokens', 0),
              'output_tokens': sem.get('output_tokens', 0),
          }

          detection = json.loads(Path('graphify-out/.graphify_detect.json').read_text())
          G = build_from_json(extraction)
          communities = cluster(G)
          cohesion = score_all(G, communities)
          gods = god_nodes(G)
          surprises = surprising_connections(G, communities)
          labels = {cid: 'Community ' + str(cid) for cid in communities}
          questions = suggest_questions(G, communities, labels)
          tokens = {'input': extraction['input_tokens'], 'output': extraction['output_tokens']}

          report = generate(G, communities, cohesion, labels, gods, surprises, detection, tokens, '.', suggested_questions=questions)
          Path('graphify-out/GRAPH_REPORT.md').write_text(report)
          to_json(G, communities, 'graphify-out/graph.json')
          print('Graph built: ' + str(G.number_of_nodes()) + ' nodes, ' + str(G.number_of_edges()) + ' edges')
          "

      # Paso 6: Generar el HTML interactivo
      - name: Generate HTML
        run: python -m graphify export html

      # Paso 7: Subir los cambios a GitHub
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/
          git diff --staged --quiet || git commit -m "Auto-rebuild graphify graph [skip ci]"
          git push
